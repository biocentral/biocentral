name: biocentral Flutter Build CI

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ '*' ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest ]  #  windows-latest, macos-latest

    steps:
      - uses: actions/checkout@v2

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang libgtk-3-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
      - run: flutter pub get
      - run: flutter test

      - run: flutter build web --web-renderer html --base-href /app/
        if: matrix.os == 'ubuntu-latest'
      - run: flutter build linux --release
        if: matrix.os == 'ubuntu-latest'
      - name: Upload build artifacts
        uses: actions/upload-artifact@v2
        with:
          name: linux-build
          path: build/linux/x64/release/bundle

      - run: flutter build windows
        if: matrix.os == 'windows-latest'

      - run: flutter build macos
        if: matrix.os == 'macos-latest'

      #- uses: actions/upload-artifact@v2
      #  with:
      #    name: biocentral-${{ matrix.os }}
      #    path: build/

  appimage:
    needs: build
    uses: ./.github/custom_actions/appimage_build.yml@${{ github.ref }}
