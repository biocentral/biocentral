name: biocentral Flutter Build CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest ]  #  windows-latest, macos-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang libgtk-3-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
      - run: flutter pub get
      - run: flutter test

      - run: flutter build web --web-renderer html --base-href /app/
        if: matrix.os == 'ubuntu-latest'
      - run: flutter build linux --release
        if: matrix.os == 'ubuntu-latest'
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: linux-build
          path: build/linux/x64/release/bundle

      - run: flutter build windows
        if: matrix.os == 'windows-latest'

      - run: flutter build macos
        if: matrix.os == 'macos-latest'

  build_appimage:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y wget libfuse2

      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: linux-build
          path: build/linux/

      - name: Download AppImageKit
        run: |
          wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Prepare AppDir
        run: |
          mkdir -p biocentral.AppDir
          cp -r build/linux/* biocentral.AppDir/

      - name: Create AppRun file
        run: |
          cat > biocentral.AppDir/AppRun << EOF
          #!/bin/sh
          cd "\$(dirname "\$0")"
          exec ./biocentral
          EOF
          chmod +x biocentral.AppDir/AppRun

      - name: Create .desktop file
        run: |
          cat > biocentral.AppDir/biocentral.desktop << EOF
          [Desktop Entry]
          Version=1.0
          Type=Application
          Terminal=false
          Name=Biocentral
          Comment=Biomedical data, from lab to paper.
          Exec=biocentral %u
          Icon=biocentral_logo
          Categories=Science;
          EOF

      - name: Copy logo
        run: cp assets/biocentral_logo/biocentral_logo.png biocentral.AppDir/

      - name: Bundle AppImage
        run: ./appimagetool-x86_64.AppImage biocentral.AppDir/ biocentral_v${{ github.sha }}.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v3
        with:
          name: biocentral-appimage
          path: biocentral_*.AppImage
